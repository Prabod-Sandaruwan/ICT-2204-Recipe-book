<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="login_container">

        <p class="login_title">
            <img src="./assets/logo.png" class="login_logo" alt="logo">
            PremiumRecipes</p>
        <p class="login_welcome">We’re happy to see you again. Please log in to continue.</p>

        <form action="#" method="POST">

            <h2>Login</h2>

            <label class="login_username" for="username">Email</label>
            <input class="login_input" type="email" id="username" name="username" placeholder="Enter your email"
                required>

            <label class="login_password" for="password">Password</label>
            <input class="login_input" type="password" id="password" name="password" placeholder="Enter your password"
                required>

            <button class="login_button" type="submit">Login</button>

            <p class="login_register">
                Don't have an account? <a href="register.html">Register</a>
            </p>

        </form>



    </div>

</body>

</html>
